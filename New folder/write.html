<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    

    body {
      background: white;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient( 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
    }

    header h1 {
      font-family: 'Caveat';
      font-size: 2.8rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.5px;
    }

    header span {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
    }

    .new-note {
      background: var(--paper);
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px var(--shadow), 0 0 0 1px var(--line);
      position: relative;
    }

    .new-note::before {
      content: '';
      position: absolute;
      left: 44px;
      top: 0;
      bottom: 0;
      width: 1px;
    }

    .new-note input[type="text"] {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      padding: 0 0 10px 0;
      border-bottom: 1px dashed var(--line);
      margin-bottom: 12px;
    }

    .new-note input::placeholder { color: var(--muted); }

    .new-note textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--ink);
      resize: none;
      min-height: 80px;
      line-height: 1.7;
    }

    .new-note textarea::placeholder { color: var(--muted); }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 3px;
      transition: all 0.15s;
      background-color: black;
    }

    .btn-save {
      background: var(--accent);
      color: white;
      background-color: black;
    }

    .btn-save:hover { background: black; }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .btn-clear:hover { color: var(--ink); border-color: var(--muted); }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      grid-column: 1 / -1;
    }

    .note-card {
      background: var(--paper);
      border-radius: 4px;
      padding: 18px 18px 14px;
      box-shadow: 0 2px 6px var(--shadow), 0 0 0 1px var(--line);
      position: relative;
      animation: popIn 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-card::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 20px;
      background: rgba(192, 98, 42, 0.18);
      border-radius: 2px;
    }

    .note-card .note-title {
      font-family: 'Caveat', cursive;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      word-break: break-word;
    }

    .note-card .note-body {
      font-size: 0.88rem;
      font-weight: 300;
      color: #5a4f40;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-card .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      border-top: 1px dashed var(--line);
      padding-top: 8px;
    }

    .note-date {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .btn-delete {
      background: black;
      color: var(--muted);
      padding: 2px 8px;
      font-size: 0.75rem;
      border: 1px solid transparent;
      border-radius: 3px;
      color: white;
    }

    .btn-delete:hover {
      color: var(--accent);
      border-color: #f0d5c8;
      background: black;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 500px) {
      header h1 { font-size: 2.2rem; }
      .notes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>What do you think?</h1>
    <span id="note-count">0 notes</span>
  </header>

  <div class="new-note">
    <input type="text" id="note-title" placeholder="Title..." maxlength="80" />
    <textarea id="note-body" placeholder="Write something..." rows="3"></textarea>
    <div class="form-actions">
      <button class="btn-clear" onclick="clearForm()">Clear</button>
      <button class="btn-save" onclick="saveNote()">Save note</button>
    </div>
  </div>

  <div class="notes-grid" id="notes-grid">
    <p class="empty" id="empty-msg">read more so you can fill here</p>
  </div>
</div>

<script>
  let notes = JSON.parse(localStorage.getItem('zhul-notes') || '[]');

  function render() {
    const grid = document.getElementById('notes-grid');
    const empty = document.getElementById('empty-msg');
    const count = document.getElementById('note-count');

    Array.from(grid.querySelectorAll('.note-card')).forEach(c => c.remove());

    count.textContent = notes.length + (notes.length === 1 ? ' note' : ' notes');

    if (notes.length === 0) {
      empty.style.display = '';
      return;
    }

    empty.style.display = 'none';

    [...notes].reverse().forEach((note, i) => {
      const realIndex = notes.length - 1 - i;
      const card = document.createElement('div');
      card.className = 'note-card';
      card.innerHTML = `
        <div class="note-title">${escHtml(note.title || 'Untitled')}</div>
        ${note.body ? `<div class="note-body">${escHtml(note.body)}</div>` : ''}
        <div class="note-footer">
          <span class="note-date">${note.date}</span>
          <button class="btn-delete" onclick="deleteNote(${realIndex})">delete</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const body  = document.getElementById('note-body').value.trim();

    if (!title && !body) return;

    const now = new Date();
    const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

    notes.push({ title, body, date });
    localStorage.setItem('zhul-notes', JSON.stringify(notes));
    clearForm();
    render();
  }

  function deleteNote(index) {
    if (!confirm('Delete this note?')) return;
    notes.splice(index, 1);
    localStorage.setItem('zhul-notes', JSON.stringify(notes));
    render();
  }

  function clearForm() {
    document.getElementById('note-title').value = '';
    document.getElementById('note-body').value = '';
    document.getElementById('note-title').focus();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveNote();
  });

  render();
</script>
</body>
</html>
